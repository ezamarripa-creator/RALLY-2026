<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rally Académico 2026 - Gestión Profesional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .tab-active { border-bottom: 3px solid #facc15; color: #facc15; font-weight: bold; }
        html, body { height: 100%; overflow-y: auto; scroll-behavior: smooth; }
        .main-container { min-height: 100vh; padding-bottom: 50px; }
        .card-zoom { transition: transform 0.3s ease; }
        .card-zoom:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-slate-50 font-sans" x-data="rallyApp()">

    <nav class="bg-slate-900 text-white shadow-2xl sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-lg"><i data-lucide="award" class="text-white w-6 h-6"></i></div>
                <h1 class="text-2xl font-black tracking-tighter uppercase italic">Rally <span class="text-indigo-400">2026</span></h1>
            </div>
            <div class="flex gap-8 items-center text-xs font-bold uppercase tracking-widest">
                <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'tab-active' : ''" class="hover:text-yellow-400 transition py-2">Dashboard</button>
                <button @click="view = 'estaciones'" :class="view === 'estaciones' ? 'tab-active' : ''" class="hover:text-yellow-400 transition py-2 text-emerald-400">Resultados Estaciones</button>
                <button @click="view = 'equipos'" :class="view === 'equipos' ? 'tab-active' : ''" class="hover:text-yellow-400 transition py-2 text-indigo-300">Gestión y Filtros</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 lg:p-10 main-container">
        
        <section x-show="view === 'dashboard'" x-cloak class="space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-end gap-4 border-b border-slate-200 pb-6">
                <div>
                    <h2 class="text-4xl font-black text-slate-800 tracking-tight uppercase">Tabla de clasificación</h2>
                    <p class="text-slate-500 font-medium italic">Clasificación oficial por sumatoria de puntos</p>
                </div>
                <div class="flex gap-3">
                    <button @click="exportarExcel()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition flex items-center gap-2">
                        <i data-lucide="download" class="w-4 h-4"></i> Excel
                    </button>
                    <button @click="exportarPDF()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg transition flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4"></i> PDF Oficial
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-xl overflow-hidden border border-slate-200">
                <table class="w-full border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] uppercase tracking-widest border-b">
                            <th class="p-6 text-center">Posición</th>
                            <th class="p-6 text-left">Equipo / Plantel</th>
                            <th class="p-6 text-center">Progreso</th>
                            <th class="p-6 text-center text-slate-900 font-black">Total</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <template x-for="(eq, index) in rankingData" :key="eq.id">
                            <tr class="hover:bg-indigo-50/30 transition-colors">
                                <td class="p-6 text-center">
                                    <span class="text-3xl font-black italic text-slate-300" :class="index < 3 ? 'text-indigo-600' : ''" x-text="index + 1"></span>
                                </td>
                                <td class="p-6">
                                    <div class="font-black text-slate-800 text-lg uppercase leading-tight" x-text="eq.nombre"></div>
                                    <div class="text-xs font-bold text-slate-400 uppercase" x-text="`${eq.plantel} | ${eq.turno}`"></div>
                                </td>
                                <td class="p-6 text-center">
                                    <div class="w-full bg-slate-100 h-2 rounded-full max-w-[100px] mx-auto overflow-hidden">
                                        <div class="bg-indigo-500 h-full transition-all" :style="`width: ${eq.numEstaciones * 10}%` shadow-sm"></div>
                                    </div>
                                    <span class="text-[9px] font-bold text-slate-500" x-text="`${eq.numEstaciones} de 10 Estaciones` "></span>
                                </td>
                                <td class="p-6 text-center">
                                    <span class="text-3xl font-black text-indigo-600" x-text="eq.puntosAcademicos.toFixed(1)"></span>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </section>

        <section x-show="view === 'estaciones'" x-cloak class="space-y-8">
            <div class="bg-emerald-900 p-8 rounded-[2.5rem] shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="text-white">
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Análisis por Estación</h2>
                        <p class="text-emerald-200 text-sm italic">Filtra y genera reportes grupales por actividad</p>
                    </div>
                    <div class="w-full md:w-80">
                        <label class="text-[10px] font-black text-emerald-400 uppercase mb-2 block">Seleccionar Actividad:</label>
                        <select x-model="selectedEstacion" class="w-full bg-emerald-800 border-none text-white p-3 rounded-xl focus:ring-2 focus:ring-yellow-400 transition cursor-pointer font-bold">
                            <option value="">-- Ver todas las estaciones --</option>
                            <template x-for="est in estacionesData" :key="est.nombre">
                                <option :value="est.nombre" x-text="est.nombre"></option>
                            </template>
                        </select>
                    </div>
                </div>
            </div>

            <div class="space-y-10">
                <template x-for="est in filteredEstacionesDisplay" :key="est.nombre">
                    <div class="bg-white rounded-[2rem] shadow-lg border border-slate-200 overflow-hidden card-zoom">
                        <div class="bg-slate-900 p-8 flex flex-col md:flex-row justify-between items-center text-white gap-6">
                            <div>
                                <h3 class="text-3xl font-black uppercase italic text-yellow-400" x-text="est.nombre"></h3>
                                <div class="flex flex-wrap gap-6 mt-3">
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase">Promedio</p>
                                        <p class="text-2xl font-black text-white" x-text="est.promedio"></p>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase">Puntaje Máximo</p>
                                        <p class="text-2xl font-black text-emerald-400" x-text="est.maximo"></p>
                                    </div>
                                    <div>
                                        <p class="text-[10px] font-bold text-slate-400 uppercase">Sumatoria Total</p>
                                        <p class="text-2xl font-black text-indigo-400" x-text="est.suma.toFixed(1)"></p>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="bg-slate-800 border border-slate-700 px-6 py-3 rounded-2xl text-center">
                                    <p class="text-[10px] font-black text-slate-400 uppercase">Total Equipos</p>
                                    <p class="text-xl font-black" x-text="est.cantidad"></p>
                                </div>
                                <button @click="exportarReporteEstacion(est)" class="bg-indigo-600 hover:bg-indigo-500 text-white p-4 rounded-2xl shadow-xl transition-all flex items-center gap-2 group">
                                    <i data-lucide="printer" class="w-6 h-6 group-hover:scale-110 transition"></i>
                                    <span class="font-black text-xs uppercase">Imprimir Estación</span>
                                </button>
                            </div>
                        </div>

                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead>
                                    <tr class="text-[10px] uppercase tracking-widest text-slate-400 bg-slate-50 border-b">
                                        <th class="px-6 py-4 text-left">Equipo</th>
                                        <th class="px-6 py-4 text-left">Plantel / Turno</th>
                                        <th class="px-6 py-4 text-center">Puntaje Obtenido</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-100">
                                    <template x-for="item in obtenerEquiposDeEstacion(est.nombre)" :key="item.id">
                                        <tr class="hover:bg-slate-50/80 transition-colors">
                                            <td class="px-6 py-4 font-black text-slate-800 uppercase text-sm" x-text="item.nombre"></td>
                                            <td class="px-6 py-4 text-xs font-bold text-slate-400 uppercase" x-text="`${item.plantel} | ${item.turno}`"></td>
                                            <td class="px-6 py-4 text-center">
                                                <span class="bg-indigo-50 text-indigo-700 px-4 py-1 rounded-full font-black text-base" x-text="item.puntos"></span>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <section x-show="view === 'equipos'" x-cloak class="space-y-8">
            <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
                    <div class="text-white">
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Buscador y Reportes</h2>
                        <p class="text-slate-400 text-sm">Filtra equipos para generar reportes individuales</p>
                    </div>
                    <div class="flex flex-wrap gap-3">
                        <button @click="limpiarCache()" class="bg-red-500/20 hover:bg-red-500 text-red-200 px-5 py-3 rounded-xl font-bold transition text-xs uppercase">Limpiar Caché Local</button>
                        <button @click="cargarDesdeGitHub()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-black shadow-xl transition text-xs uppercase flex items-center gap-2">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Actualizar Datos
                        </button>
                    </div>
                </div>

                <div class="relative max-w-2xl mx-auto">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
                    <input 
                        type="text" 
                        x-model="search" 
                        placeholder="Buscar por nombre de equipo o plantel..." 
                        class="w-full bg-slate-800 border-none text-white p-4 pl-12 rounded-2xl focus:ring-2 focus:ring-yellow-400 transition"
                    >
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <template x-for="eq in filteredRanking" :key="eq.id">
                    <div class="bg-white p-6 rounded-[2rem] shadow-lg border border-slate-100 flex flex-col card-zoom">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-xl font-black text-slate-800 uppercase italic leading-none mb-1" x-text="eq.nombre"></h3>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" x-text="`${eq.plantel} • ${eq.turno}`"></p>
                            </div>
                            <button @click="exportarReporteIndividual(eq)" class="bg-slate-100 hover:bg-indigo-600 hover:text-white p-2 rounded-lg transition-colors group">
                                <i data-lucide="printer" class="w-5 h-5"></i>
                            </button>
                        </div>
                        
                        <div class="flex-grow space-y-2 mb-6 border-t pt-4">
                            <template x-for="res in eq.detalles">
                                <div class="flex justify-between text-xs py-2 border-b border-slate-50 last:border-0">
                                    <span class="text-slate-500 font-medium" x-text="res.estacion"></span>
                                    <span class="font-black text-indigo-600" x-text="res.puntos"></span>
                                </div>
                            </template>
                        </div>

                        <div class="bg-indigo-600 text-white p-5 rounded-2xl text-center shadow-lg">
                            <p class="text-[9px] uppercase font-bold text-indigo-200 mb-1">Puntaje Acumulado</p>
                            <span class="text-4xl font-black" x-text="eq.puntosAcademicos.toFixed(1)"></span>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </main>

    <script>
        const GITHUB_DATA_URL = 'datos.csv';

        function rallyApp() {
            return {
                view: 'dashboard',
                search: '',
                selectedEstacion: '',
                rawData: [],
                rankingData: [],
                estacionesData: [],

                init() {
                    const saved = localStorage.getItem('rally_data_v2026');
                    if (saved) {
                        this.rawData = JSON.parse(saved);
                        this.actualizarRanking();
                    }
                    this.cargarDesdeGitHub();
                    setTimeout(() => lucide.createIcons(), 100);
                },

                async cargarDesdeGitHub() {
                    try {
                        const response = await fetch(GITHUB_DATA_URL + '?t=' + new Date().getTime());
                        if (!response.ok) throw new Error('Archivo no encontrado');
                        const csvText = await response.text();
                        const workbook = XLSX.read(csvText, { type: 'string' });
                        const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                        
                        this.rawData = json.map(row => ({
                            id: this.findKey(row, 'id'),
                            nombre: this.findKey(row, 'nombre'),
                            plantel: this.findKey(row, 'plantel'),
                            turno: this.findKey(row, 'turno'),
                            estacion: this.findKey(row, 'estacion'),
                            puntajeEstacion: parseFloat(this.findKey(row, 'puntajeEstacion')) || 0
                        }));

                        localStorage.setItem('rally_data_v2026', JSON.stringify(this.rawData));
                        this.actualizarRanking();
                    } catch (e) {
                        console.warn("Error al sincronizar:", e);
                    }
                },

                findKey(obj, target) {
                    const key = Object.keys(obj).find(k => k.trim().toLowerCase() === target.toLowerCase());
                    return key ? obj[key] : null;
                },

                actualizarRanking() {
                    const equiposMap = {};
                    const estMap = {};

                    this.rawData.forEach(row => {
                        const id = row.id;
                        if (!id) return;
                        
                        if (!equiposMap[id]) {
                            equiposMap[id] = { id, nombre: row.nombre, plantel: row.plantel, turno: row.turno, numEstaciones: 0, puntosAcademicos: 0, detalles: [] };
                        }
                        
                        if (row.estacion) {
                            const eName = row.estacion;
                            if (!estMap[eName]) {
                                estMap[eName] = { nombre: eName, cantidad: 0, suma: 0, maximo: 0 };
                            }
                            estMap[eName].cantidad++;
                            estMap[eName].suma += row.puntajeEstacion;
                            if(row.puntajeEstacion > estMap[eName].maximo) estMap[eName].maximo = row.puntajeEstacion;

                            equiposMap[id].numEstaciones++;
                            equiposMap[id].puntosAcademicos += row.puntajeEstacion;
                            equiposMap[id].detalles.push({ estacion: row.estacion, puntos: row.puntajeEstacion });
                        }
                    });

                    this.rankingData = Object.values(equiposMap).sort((a, b) => b.puntosAcademicos - a.puntosAcademicos);
                    
                    this.estacionesData = Object.values(estMap).map(e => ({
                        ...e,
                        promedio: (e.suma / e.cantidad).toFixed(1)
                    })).sort((a, b) => a.nombre.localeCompare(b.nombre));
                    
                    setTimeout(() => lucide.createIcons(), 50);
                },

                get filteredEstacionesDisplay() {
                    if (this.selectedEstacion === '') return this.estacionesData;
                    return this.estacionesData.filter(e => e.nombre === this.selectedEstacion);
                },

                obtenerEquiposDeEstacion(nombreEstacion) {
                    return this.rawData
                        .filter(r => r.estacion === nombreEstacion)
                        .map(r => ({
                            id: r.id,
                            nombre: r.nombre,
                            plantel: r.plantel,
                            turno: r.turno,
                            puntos: r.puntajeEstacion
                        }))
                        .sort((a, b) => b.puntos - a.puntos);
                },

                get filteredRanking() {
                    const query = this.search.toLowerCase();
                    return this.rankingData.filter(eq => 
                        eq.nombre?.toLowerCase().includes(query) || 
                        eq.plantel?.toLowerCase().includes(query)
                    );
                },

                limpiarCache() {
                    if(confirm("¿Borrar datos almacenados?")) {
                        localStorage.removeItem('rally_data_v2026');
                        location.reload();
                    }
                },

                exportarExcel() {
                    const data = this.rankingData.map((eq, i) => ({
                        'Posición': i + 1, 'Equipo': eq.nombre, 'Plantel': eq.plantel, 'Turno': eq.turno, 'Puntaje': eq.puntosAcademicos.toFixed(1)
                    }));
                    const ws = XLSX.utils.json_to_sheet(data);
                    const wb = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(wb, ws, "Ranking");
                    XLSX.writeFile(wb, "Reporte_Rally_2026.xlsx");
                },

                exportarPDF() {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.text("REPORTE OFICIAL RALLY 2026", 15, 20);
                    doc.autoTable({
                        startY: 30,
                        head: [['Pos', 'Equipo', 'Plantel', 'Total']],
                        body: this.rankingData.map((eq, i) => [i + 1, eq.nombre, eq.plantel, eq.puntosAcademicos.toFixed(1)])
                    });
                    doc.save("Ranking_Oficial.pdf");
                },

                exportarReporteIndividual(eq) {
                    if (!eq) return;
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.setFontSize(22);
                    doc.text(eq.nombre.toUpperCase(), 15, 25);
                    doc.setFontSize(12);
                    doc.text(`${eq.plantel} - Turno: ${eq.turno}`, 15, 35);
                    doc.autoTable({
                        startY: 50,
                        head: [['Estación', 'Puntos']],
                        body: eq.detalles.map(d => [d.estacion, d.puntos]),
                        foot: [['TOTAL', eq.puntosAcademicos.toFixed(1)]]
                    });
                    doc.save(`Reporte_${eq.nombre}.pdf`);
                },

                exportarReporteEstacion(est) {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    const equipos = this.obtenerEquiposDeEstacion(est.nombre);
                    
                    doc.setFontSize(18);
                    doc.text(`REPORTE DE ESTACIÓN: ${est.nombre.toUpperCase()}`, 15, 20);
                    
                    doc.setFontSize(10);
                    doc.text(`Promedio: ${est.promedio} | Máximo: ${est.maximo} | Total Equipos: ${est.cantidad}`, 15, 28);
                    doc.text(`Sumatoria Total de la Estación: ${est.suma.toFixed(1)}`, 15, 33);

                    doc.autoTable({
                        startY: 40,
                        head: [['Equipo', 'Plantel', 'Turno', 'Puntaje']],
                        body: equipos.map(e => [e.nombre, e.plantel, e.turno, e.puntos]),
                        theme: 'striped',
                        headStyles: { fillStyle: [30, 41, 59] }
                    });
                    
                    doc.save(`Reporte_Estacion_${est.nombre}.pdf`);
                }
            }
        }
    </script>
</body>
</html>
